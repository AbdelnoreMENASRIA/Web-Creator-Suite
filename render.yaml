services:
  # Frontend Landing Page
  - type: web
    name: teach-in-english-front
    runtime: node
    plan: free
    buildCommand: |
      cd artifacts/landing-page && \
      npm install -g pnpm && \
      pnpm install --frozen-lockfile && \
      PORT=3000 BASE_PATH="/" VITE_API_URL="https://teach-in-english-api.onrender.com" pnpm run build
    startCommand: npm install -g http-server && http-server artifacts/landing-page/dist -p 3000 --gzip
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: BASE_PATH
        value: "/"
      - key: VITE_API_URL
        value: https://teach-in-english-api.onrender.com
    routes:
      - type: redirect
        source: /(.*)
        destination: /$1

  # API Server Backend
  - type: web
    name: teach-in-english-api
    runtime: node
    plan: free
    buildCommand: |
      cd artifacts/api-server && \
      npm install -g pnpm && \
      pnpm install --frozen-lockfile && \
      pnpm run build
    startCommand: cd artifacts/api-server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://teach-in-english-front.onrender.com
      # Add your database and other env vars here
      - key: DATABASE_URL
        fromDatabase:
          name: teach-in-english-db
          property: connectionString
