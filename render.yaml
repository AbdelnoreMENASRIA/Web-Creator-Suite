# Teach In English - Render Deployment Configuration
# Now using Supabase PostgreSQL (Free, unlimited)

services:
  # Frontend Landing Page
  - type: web
    name: teach-in-english-front
    runtime: node
    plan: free
    buildCommand: cd artifacts/landing-page && pnpm install --frozen-lockfile && PORT=3000 BASE_PATH="/" VITE_API_URL="https://teach-in-english-api.onrender.com" pnpm run build
    startCommand: npm install -g http-server && http-server artifacts/landing-page/dist -p 3000 --gzip
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: BASE_PATH
        value: "/"
      - key: VITE_API_URL
        value: https://teach-in-english-api.onrender.com
    routes:
      - type: redirect
        source: /(.*)
        destination: /$1

  # API Server Backend
  - type: web
    name: teach-in-english-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm -F @workspace/db run push && cd artifacts/api-server && pnpm run build
    startCommand: cd artifacts/api-server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://teach-in-english-front.onrender.com
      - key: DATABASE_URL
        value: postgresql://postgres:Abdlenormen01%40@db.cykzrclmccvdbywvftwj.supabase.co:5432/postgres?sslmode=require&inet_family=ipv4
